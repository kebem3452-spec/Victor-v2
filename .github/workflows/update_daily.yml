name: Victor V2 - Automatisation Intégrale

on:
  schedule:
    - cron: '0 7 * * *'
    - cron: '0 20 * * *'
    - cron: '30 7 * * 0'
    - cron: '0 6 1 * *'
  workflow_dispatch:
    inputs:
      job:
        description: 'Quel job lancer ?'
        required: true
        default: 'soir'
        type: choice
        options:
          - matin
          - soir
          - dimanche
          - mensuel

permissions:
  contents: write

jobs:

  matin-pronostics:
    if: |
      github.event.schedule == '0 7 * * *' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.job == 'matin')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - run: pip install -r requirements.txt
      - name: Pipeline du Matin
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          python 6_maj_quotidienne.py
          python 2_feature_engineering.py
      - name: Sauvegarder sur GitHub
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff-index --quiet HEAD || git commit -m "🤖 [Auto] Maj des statistiques du matin"
          git push origin main

  soir-resultats:
    if: |
      github.event.schedule == '0 20 * * *' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.job == 'soir')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - run: pip install -r requirements.txt
      - name: Collecte des résultats
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python 12_collecteur_resultats.py 2026-05-24
      - name: Sauvegarder sur GitHub
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff-index --quiet HEAD || git commit -m "🤖 [Auto] Arrivées du soir"
          git push origin main

  dimanche-reentrainement:
    if: |
      github.event.schedule == '30 7 * * 0' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.job == 'dimanche')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - run: pip install -r requirements.txt
      - name: Entraînement Modèle & Superviseur
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          python 3_entrainer_modele.py
          python 10_dataset_simulation.py
          python 11_superviseur.py
      - name: Sauvegarder Modèles sur GitHub
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/ models/
          git diff-index --quiet HEAD || git commit -m "🏆 [IA] Modèles hebdomadaires mis à jour"
          git push origin main

  mensuel-optimisation:
    if: |
      github.event.schedule == '0 6 1 * *' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.job == 'mensuel')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - run: pip install -r requirements.txt
      - name: Optuna & Backtesting
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          python 9_optimiser_optuna.py
          python 7_backtesting.py
      - name: Sauvegarder Paramètres sur GitHub
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add models/
          git diff-index --quiet HEAD || git commit -m "⚡ [Optuna] Optimisation mensuelle terminée"
          git push origin main
