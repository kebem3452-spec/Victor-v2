name: Mise à jour quotidienne Victor V2

on:
  schedule:
    # 7h UTC tous les matins
    - cron: '0 7 * * *'
  workflow_dispatch: # Permet de le lancer manuellement depuis l'interface GitHub

jobs:
  update-pmu:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          
      - name: Install dependencies
        run: pip install -r requirements.txt
        
      - name: Run PMU Collector
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python 6_maj_quotidienne_3.py
        
      - name: Run Feature Engineering
        run: python 2_feature_engineering_3.py
        
      - name: Run Model Retraining
        run: python 3_entrainer_modele_3.py
        
      - name: Upload Models to Supabase
        # Ici, tu pourrais ajouter un script simple pour pousser les .pkl 
        # générés vers ton bucket Supabase si tu veux automatiser le déploiement
        run: echo "Modèles mis à jour localement."